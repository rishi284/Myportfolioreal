</nav>

<section class="projects-section">
  <h1>Projects</h1>

  <div class="project-container">

    <div class="project-card" onclick="openModal('p1')">
      <h3>AI Powered Skin Disease Detection</h3>
      <p>Click to view details</p>
    </div>

    <div class="project-card" onclick="openModal('p2')">
      <h3>Urban Sound Analysis</h3>
      <p>Click to view details</p>
    </div>

    <div class="project-card" onclick="openModal('p3')">
      <h3>Chronic Kidney Disease Prediction</h3>
      <p>Click to view details</p>
    </div>

  </div>
</section>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal()">&times;</span>
    <div id="modal-body"></div>
  </div>
</div>

<script>
function openModal(project) {
  let content = "";

  if (project === "p1") {
    content = `
      <h2>AI Powered Skin Disease Detection</h2>
      <ul>
        <li>Multi-class classification using EfficientNetB0 transfer learning</li>
        <li>Built a real-time inference pipeline enabling automated and fast disease prediction</li>
        <li>Achieved more than 90% accuracy on a dataset of 10,000+ images across 7 skin disease categories.</li>
      </ul>
      <p><b>Tech:</b> Python, HTML, CSS, JavaScript</p>
    `;
  }

  if (project === "p2") {
    content = `
      <h2>Urban Sound Analysis</h2>
      <ul>
        <li>Audio classification using UrbanSound8K</li>
        <li>Recognizes 10 sound types</li>
        <li>Engineered advanced audio features by extracting MFCCs and spectrograms, significantly enhancing the model's ability to 
distinguish complex acoustic patterns</li>
      </ul>
      <p><b>Tech:</b> Python, Jupyter Notebook</p>
    `;
  }

  if (project === "p3") {
    content = `
      <h2>Chronic Kidney Disease Prediction</h2>
      <ul>
        <li> Designed a machine learning model to predict Chronic Kidney Disease using patient health metrics</li>
        <li>Performed data cleaning, feature selection, and normalization to improve prediction quality</li>
        <li>Helps early diagnosis</li>
      </ul>
      <p><b>Tech:</b> Python, Jupyter Notebook</p>
    `;
  }

  document.getElementById("modal-body").innerHTML = content;
  document.getElementById("modal").style.display = "flex";
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
}
</script>

</body>
</html>
